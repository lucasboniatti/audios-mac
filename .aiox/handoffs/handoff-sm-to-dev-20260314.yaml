  architecture: |
    Supabase Auth ← (anon key + JWT) → Node bridge (Express + middleware `requireAuth`)
                                 ↓
                  Supabase Postgres (profiles, transcriptions, sync_conflicts, tags, storage avatars)
                                 ↑
        Companion local (CoreData / AudioFlow.sqlite read-only) ← Node.js bridge (server.js)
                                  ↕ WebSocket / REST (dashboard, tags, preferences)
    O PRD define FR-015/FR-016/FR-017 para autenticacao, sync e analytics; o doc de arquitetura revisto
    descreve RLS, storage policies e algoritmos de reconciliação (version check + sync_conflicts).

