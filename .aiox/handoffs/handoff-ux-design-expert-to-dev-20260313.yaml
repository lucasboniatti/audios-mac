    current_task: "Frontend web funcional conectado ao CoreData do app macOS"
    branch: "main"

  summary: |
    Criei o frontend web do ÁudioFlow com duas páginas (Gravações + Dashboard)
    conectadas ao CoreData/SQLite do app macOS via Node.js API bridge.
    Tudo funcional em localhost:3000. Dados reais, WebSocket real-time, copiar texto.

  decisions:
    - "Frontend como HTML estático servido por Express (não React/Vue — KISS)"
    - "Node.js lê diretamente o SQLite do CoreData (better-sqlite3, readonly)"
    - "WebSocket polling a cada 2s para detectar novas transcrições"
    - "CoreData epoch offset: 2001-01-01T00:00:00Z aplicado na conversão de timestamps"
    - "Tailwind via CDN, sem build step — simplicidade para protótipo"

  files_created:
    - "frontend/server.js — API Express + WebSocket (3 endpoints + static serve)"
    - "frontend/index.html — Página Gravações (fetch real, agrupamento por data, copiar)"
    - "frontend/dashboard.html — Página Dashboard (stats, gráfico semanal, top words)"
    - "frontend/package.json — deps: express, better-sqlite3, ws, cors"

  architecture: |
    [App Swift] → CoreData (SQLite) ← [Node.js server.js :3000] → [HTML Frontend]
                                              ↓ WebSocket :3001
                                         [Auto-update no browser]

    DB Path: ~/Library/Application Support/AudioFlow/AudioFlow.sqlite
    Schema: ZTRANSCRIPTION (Z_PK, ZTEXT, ZTIMESTAMP, ZID blob)
    Timestamp: CoreData epoch = seconds since 2001-01-01T00:00:00Z

  api_endpoints:
    - "GET /api/transcriptions — lista paginada (?limit=&offset=)"
    - "GET /api/transcriptions/search?q= — busca case-insensitive"
    - "GET /api/transcriptions/stats — totalWords, avgDaily, weeklyChart, topWords"
    - "GET / — serve index.html (Gravações)"
    - "GET /dashboard — serve dashboard.html"

  what_works:
    - "Transcrições reais do CoreData renderizadas agrupadas por data"
    - "Botão copiar funcional (navigator.clipboard)"
    - "Dashboard com dados calculados do banco real"
    - "WebSocket auto-refresh quando nova transcrição é detectada"
    - "Toast notifications"
    - "Navegação entre páginas"

  blockers: []

