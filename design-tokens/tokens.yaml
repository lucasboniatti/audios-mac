coverage:
  colors_extracted: 20
  spacing_values: 11
  typography_sizes: 12
  font_weights: 5
  border_radii: 9
  shadow_presets: 13
  components_tokenized: 6
  total_tokens: 200+
  coverage_percentage: 100%
  dark_mode_support: true
  light_mode_support: true
  notes: |
    - Design system completo com dark mode e light mode
    - Cores otimizadas para contraste WCAG AA em ambos os modos
    - Sistema de cores minimalista com foco em acessibilidade
    - Uso de opacidade para criar hierarquia visual
    - Material Symbols como sistema de ícones padrão
    - Shadows adaptadas para cada modo (mais escuras no light, mais sutis no dark)