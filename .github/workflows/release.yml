name: Release AudioFlow

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build app bundle and release zip
        run: ./build_app.sh
        env:
          SKIP_OPEN: "1"
          PACKAGE_RELEASE_ZIP: "1"

      - name: Verify generated assets
        run: ls -la dist

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AudioFlow.zip
          generate_release_notes: true
