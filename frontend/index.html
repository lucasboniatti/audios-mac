<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>ÁudioFlow - Suas Transcrições</title>
  <link rel="stylesheet" href="/dist/styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="/theme.js"></script>
  <script src="/auth.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 33.333%;
      color: var(--color-text-tertiary);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .nav-item:hover {
      color: var(--color-text-secondary);
    }
    .nav-item.active {
      color: var(--color-primary);
    }
    .nav-icon {
      font-size: 32px;
    }
    .nav-label {
      font-size: 11px;
      font-weight: 500;
    }
    .loading-spinner {
      color: var(--color-text-disabled);
      font-size: 32px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header-audioflow">
    <div style="display: flex; align-items: center; gap: 8px;">
      <div style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--color-primary);">
        <span class="material-symbols-outlined" style="font-size: 32px; font-weight: bold;">graphic_eq</span>
      </div>
      <h1 style="font-size: 20px; font-weight: 700; color: var(--color-text-primary);">ÁudioFlow</h1>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div style="text-align: right; display: none;" class="sm:block">
        <p class="text-label" id="username-display">Usuário</p>
        <button onclick="handleLogout()" style="font-size: 12px; color: var(--color-text-tertiary); background: none; border: none; cursor: pointer;">Sair</button>
      </div>
      <button onclick="toggleDarkMode()" style="padding: 8px; color: var(--color-text-tertiary); background: none; border: none; cursor: pointer;">
        <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
      </button>
      <div class="user-avatar">
        <span id="user-initial">U</span>
      </div>
    </div>
  </header>

  <!-- Search Bar -->
  <div style="padding: 0 16px 16px;">
    <div class="search-bar">
      <span class="material-symbols-outlined" style="font-size: 18px; color: var(--color-text-tertiary);">search</span>
      <input id="search-input" type="text" placeholder="Buscar transcrições..." />
      <button id="search-clear" style="padding: 4px; background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); display: none;">
        <span class="material-symbols-outlined" style="font-size: 16px;">close</span>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <main style="flex: 1; overflow-y: auto; padding-bottom: 96px;">
    <section style="padding: 0 16px 16px; display: flex; align-items: center; justify-content: space-between;">
      <h2 style="font-size: 24px; font-weight: 700; color: var(--color-text-primary);">Bem-vindo, Lucas</h2>
      <div style="display: flex; align-items: center; gap: 12px;">
        <div style="display: flex; gap: 8px;">
          <a href="/api/export/csv" download class="btn-export btn-export-csv" data-export-format="csv">
            <span class="material-symbols-outlined" style="font-size: 14px;">file_download</span> CSV
          </a>
          <a href="/api/export/json" download class="btn-export btn-export-json" data-export-format="json">
            <span class="material-symbols-outlined" style="font-size: 14px;">file_download</span> JSON
          </a>
        </div>
        <a href="/favorites" style="color: var(--color-primary); font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 4px;">
          <span class="material-symbols-outlined" style="font-size: 18px;">star</span> Favoritos
        </a>
      </div>
    </section>

    <!-- Dynamic transcription list -->
    <div id="transcription-list" style="padding: 0 16px;">
      <div style="display: flex; align-items: center; justify-content: center; padding: 48px;">
        <span class="material-symbols-outlined loading-spinner">progress_activity</span>
      </div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state hidden">
      <span class="material-symbols-outlined empty-state-icon">mic_off</span>
      <p class="empty-state-title">Nenhuma transcrição ainda</p>
      <p class="empty-state-description">Use Fn+Space no app para gravar</p>
    </div>
  </main>

  <!-- Toast container -->
  <div id="toast-container" style="position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%); z-index: 60;"></div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="/">
      <span class="material-symbols-outlined nav-icon" style="font-variation-settings: 'FILL' 1;">view_list</span>
      <span class="nav-label">Gravações</span>
    </a>
    <div style="position: relative; top: -24px; width: 33.333%; display: flex; justify-content: center;">
      <button class="fab">
        <span class="material-symbols-outlined" style="font-size: 32px;">mic</span>
      </button>
    </div>
    <a class="nav-item" href="/dashboard">
      <span class="material-symbols-outlined nav-icon">dashboard</span>
      <span class="nav-label">Dashboard</span>
    </a>
  </nav>

  <script>
    const API = '';

    // Update theme icon on load
    function updateThemeIcon() {
      const icon = document.getElementById('theme-icon');
      icon.textContent = isDarkMode() ? 'light_mode' : 'dark_mode';
    }
    updateThemeIcon();

    const origToggle = window.toggleDarkMode;
    window.toggleDarkMode = function() {
      origToggle();
      updateThemeIcon();
    };
    window.addEventListener('audioflow:theme-changed', updateThemeIcon);

    // --- Helpers ---
    function formatDate(iso) {
      const d = new Date(iso);
      const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
      return `${d.getDate()} de ${months[d.getMonth()]}, ${d.getFullYear()}`;
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function countWords(text) {
      return String(text ?? '').split(/\s+/).filter(w => w.length > 0).length;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function pickTagColor(seed) {
      const palette = ['#007AFF', '#10B981', '#F97316', '#EC4899', '#8B5CF6', '#14B8A6'];
      const hash = Array.from(seed).reduce((acc, char) => acc + char.charCodeAt(0), 0);
      return palette[hash % palette.length];
    }

    function showToast(msg) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.cssText = 'background-color: var(--color-elevated); color: var(--color-text-primary); padding: 8px 16px; border-radius: 9999px; font-size: 14px; box-shadow: var(--shadow-lg);';
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast('Texto copiado!');
      } catch {
        showToast('Erro ao copiar');
      }
    }

    async function handleProtectedExport(event) {
      event.preventDefault();
      const format = event.currentTarget.dataset.exportFormat;
      try {
        await AuthAPI.downloadFile(`${API}/api/export/${format}`, `audioflow-transcriptions.${format}`);
        showToast(`Download ${format.toUpperCase()} iniciado`);
      } catch {
        showToast(`Erro ao exportar ${format.toUpperCase()}`);
      }
    }

    async function toggleFavorite(id, currentlyFavorite) {
      try {
        await AuthAPI.toggleFavorite(id, !currentlyFavorite);
        await refreshVisibleTranscriptions();
        showToast(currentlyFavorite ? 'Removido dos favoritos' : 'Adicionado aos favoritos');
      } catch (err) {
        showToast(err.message || 'Erro ao atualizar favorito');
      }
    }

    function renderTags(tags, transcriptionId) {
      const tagButtons = (tags || []).map((tag) => `
        <button
          onclick="removeTag(${transcriptionId}, ${tag.id})"
          style="display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 9999px; border: 1px solid ${tag.color}; background: ${tag.color}20; color: ${tag.color}; cursor: pointer; font-size: 12px; font-weight: 600;"
          title="Remover tag"
        >
          <span>${escapeHtml(tag.name)}</span>
          <span class="material-symbols-outlined" style="font-size: 14px;">close</span>
        </button>
      `).join('');

      return `
        <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;">
          ${tagButtons}
          <button
            onclick="promptForTag(${transcriptionId})"
            style="display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 9999px; border: 1px dashed var(--color-border-default); background: transparent; color: var(--color-text-tertiary); cursor: pointer; font-size: 12px; font-weight: 600;"
            title="Adicionar tag"
          >
            <span class="material-symbols-outlined" style="font-size: 14px;">add</span>
            <span>Tag</span>
          </button>
        </div>
      `;
    }

    async function promptForTag(transcriptionId) {
      const tagName = prompt('Nome da tag');
      if (!tagName) {
        return;
      }

      const normalizedName = tagName.trim();
      if (!normalizedName) {
        return;
      }

      try {
        const tags = await AuthAPI.getTagsForMode();
        let tag = tags.find((candidate) => candidate.name.toLowerCase() === normalizedName.toLowerCase());

        if (!tag) {
          tag = await AuthAPI.createTagForMode({
            name: normalizedName,
            color: pickTagColor(normalizedName),
          });
        }

        if (AuthAPI.isCloudMode()) {
          // Cloud mode - update transcription with new tag
          const cloudData = await AuthAPI.pullFromCloud();
          const cloudT = cloudData.transcriptions?.find(t => t.local_id === transcriptionId);
          if (cloudT) {
            const currentTags = cloudT.tags || [];
            if (!currentTags.includes(normalizedName)) {
              await AuthAPI.updateCloudTranscription(cloudT.id, {
                tags: [...currentTags, normalizedName]
              });
            }
          }
        } else {
          await AuthAPI.addTagToTranscription(transcriptionId, tag.id);
        }

        await refreshVisibleTranscriptions();
        showToast(`Tag ${tag.name} aplicada`);
      } catch (err) {
        showToast(err.message || 'Erro ao salvar tag');
      }
    }

    async function removeTag(transcriptionId, tagId) {
      try {
        await AuthAPI.removeTagFromTranscription(transcriptionId, tagId);
        await refreshVisibleTranscriptions();
        showToast('Tag removida');
      } catch (err) {
        showToast(err.message || 'Erro ao remover tag');
      }
    }

    // --- Group transcriptions by date ---
    function groupByDate(transcriptions) {
      const groups = {};
      for (const t of transcriptions) {
        const key = formatDate(t.timestamp);
        if (!groups[key]) groups[key] = [];
        groups[key].push(t);
      }
      return groups;
    }

    // --- Render ---
    function render(transcriptions) {
      const list = document.getElementById('transcription-list');
      const empty = document.getElementById('empty-state');

      if (!transcriptions.length) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      const groups = groupByDate(transcriptions);
      let html = '';

      for (const [date, items] of Object.entries(groups)) {
        const totalWords = items.reduce((sum, t) => sum + countWords(t.text), 0);

        html += `
          <section class="date-group">
            <div class="date-group-header">
              <h3 class="date-group-title">${date}</h3>
              <div class="date-group-badge">${totalWords} palavras</div>
            </div>
            <div class="transcription-card">
        `;

        for (const t of items) {
          const escaped = escapeHtml(t.text ?? '');
          const isFav = t.isFavorite === true;
          const starColor = isFav ? 'color: var(--color-warning);' : 'color: var(--color-text-tertiary);';
          const starFill = isFav ? "font-variation-settings: 'FILL' 1;" : '';
          html += `
            <article class="transcription-item">
              <span style="font-size: 12px; font-weight: 500; color: var(--color-text-tertiary); width: 64px; flex-shrink: 0;">${formatTime(t.timestamp)}</span>
              <div style="flex-grow: 1; padding-right: 84px;">
                <p style="font-size: 15px; line-height: 1.6; color: var(--color-text-primary);">${escaped}</p>
                ${renderTags(t.tags, t.id)}
              </div>
              <div style="position: absolute; top: 12px; right: 12px; display: flex; gap: 8px; opacity: 0; transition: opacity 0.2s ease;" class="item-actions">
                <button onclick="copyText(\`${escaped.replace(/`/g, '\\`')}\`)" style="padding: 4px; background: none; border: none; cursor: pointer; color: var(--color-text-tertiary);" title="Copiar">
                  <span class="material-symbols-outlined" style="font-size: 18px;">content_copy</span>
                </button>
                <button onclick="toggleFavorite(${t.id}, ${isFav})" style="padding: 4px; background: none; border: none; cursor: pointer; ${starColor}" title="Favoritar">
                  <span class="material-symbols-outlined" style="font-size: 18px; ${starFill}">star</span>
                </button>
              </div>
            </article>
          `;
        }

        html += '</div></section>';
      }

      list.innerHTML = html;

      // Add hover effect for actions
      document.querySelectorAll('.transcription-item').forEach(item => {
        const actions = item.querySelector('.item-actions');
        item.addEventListener('mouseenter', () => actions.style.opacity = '1');
        item.addEventListener('mouseleave', () => actions.style.opacity = '0');
      });
    }

    // --- Fetch data ---
    let currentTranscriptionsRequest = 0;
    let syncInProgress = false;

    async function performInitialSync() {
      if (syncInProgress) return;
      if (!AuthAPI.isCloudMode()) return;

      syncInProgress = true;
      try {
        showToast('Sincronizando com a nuvem...');
        const result = await AuthAPI.syncLocalToCloud();
        showToast(`${result.synced || 0} transcrições sincronizadas!`);
      } catch (err) {
        console.error('Sync error:', err);
      } finally {
        syncInProgress = false;
      }
    }

    async function loadTranscriptions(query = '') {
      const requestId = ++currentTranscriptionsRequest;
      const isCloud = AuthAPI.isCloudMode();

      try {
        let data;

        if (isCloud) {
          // Cloud mode - use cloud endpoints
          if (query) {
            // Search in cloud (using pull + client-side filter for now)
            const cloudData = await AuthAPI.pullFromCloud();
            const q = query.toLowerCase();
            const filtered = (cloudData.transcriptions || []).filter(t =>
              (t.text || '').toLowerCase().includes(q)
            );
            data = { transcriptions: filtered.map(t => ({
              id: t.local_id || t.id,
              text: t.text,
              timestamp: t.timestamp,
              isFavorite: t.is_favorite,
              tags: (t.tags || []).map(name => ({ name, color: '#007AFF' }))
            }))};
          } else {
            const cloudData = await AuthAPI.pullFromCloud();
            data = {
              transcriptions: (cloudData.transcriptions || []).map(t => ({
                id: t.local_id || t.id,
                text: t.text,
                timestamp: t.timestamp,
                isFavorite: t.is_favorite,
                tags: (t.tags || []).map(name => ({ name, color: '#007AFF' }))
              }))
            };
          }
        } else {
          // Local mode
          const normalizedQuery = query.trim();
          const endpoint = normalizedQuery
            ? `${API}/api/transcriptions/search?q=${encodeURIComponent(normalizedQuery)}`
            : `${API}/api/transcriptions`;

          data = await AuthAPI.fetchJSON(endpoint, {}, 'Unable to load transcriptions');
        }

        if (requestId !== currentTranscriptionsRequest) {
          return;
        }

        allTranscriptions = data.transcriptions || [];
        render(allTranscriptions);
      } catch (err) {
        if (requestId !== currentTranscriptionsRequest) {
          return;
        }

        document.getElementById('transcription-list').innerHTML = `
          <div style="text-align: center; padding: 48px;">
            <span class="material-symbols-outlined" style="font-size: 40px; color: var(--color-destructive);">error</span>
            <p style="color: var(--color-text-tertiary);">Não foi possível conectar ao servidor</p>
            <p style="color: var(--color-text-disabled); font-size: 14px; margin-top: 4px;">Execute: <code style="background-color: var(--color-elevated); padding: 2px 8px; border-radius: 4px;">npm start</code> na pasta frontend/</p>
          </div>
        `;
      }
    }

    async function refreshVisibleTranscriptions() {
      await loadTranscriptions(searchInput.value.trim());
    }

    // --- WebSocket real-time ---
    async function connectWS() {
      try {
        const wsUrl = await AuthAPI.getWebSocketUrl();
        const ws = new WebSocket(wsUrl);
        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.type === 'new_transcriptions' || data.type === 'refresh' || data.type === 'transcription_deleted' || data.type === 'favorite_added' || data.type === 'favorite_removed' || data.type === 'tag_added' || data.type === 'tag_removed' || data.type === 'tag_created' || data.type === 'tag_deleted') {
            refreshVisibleTranscriptions();
            if (data.type === 'new_transcriptions') {
              showToast('Nova transcrição recebida!');
            }
          } else if (data.type === 'preferences_updated') {
            window.AudioFlowTheme.ensurePreferencesLoaded(true).catch(() => {});
          }
        };
        ws.onclose = () => setTimeout(connectWS, 3000);
      } catch (_) {
        setTimeout(connectWS, 3000);
      }
    }

    // --- Search ---
    let allTranscriptions = [];
    let searchDebounceTimer = null;
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');

    searchInput.addEventListener('input', (e) => {
      const q = e.target.value.trim();
      searchClear.style.display = q ? 'block' : 'none';

      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => {
        loadTranscriptions(q);
      }, q ? 200 : 0);
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.style.display = 'none';
      clearTimeout(searchDebounceTimer);
      loadTranscriptions();
      searchInput.focus();
    });

    document.querySelectorAll('[data-export-format]').forEach((link) => {
      link.addEventListener('click', handleProtectedExport);
    });

    // --- Authentication ---
    async function initAuth() {
      const session = await AuthAPI.requireAuth();
      if (!session) {
        return false;
      }

      document.getElementById('username-display').textContent = session.username;
      document.getElementById('user-initial').textContent = session.username.charAt(0).toUpperCase();
      return true;
    }

    async function handleLogout() {
      await AuthAPI.logout();
      window.location.href = '/login.html';
    }

    async function bootstrap() {
      const authenticated = await initAuth();
      if (!authenticated) return;
      await window.AudioFlowTheme.ensurePreferencesLoaded(true);
      updateThemeIcon();

      // Show mode indicator
      if (AuthAPI.isCloudMode()) {
        document.getElementById('username-display').textContent += ' ☁️';
        await performInitialSync();
      }

      await loadTranscriptions();
      connectWS();
    }

    bootstrap();
  </script>

</body>
</html>
