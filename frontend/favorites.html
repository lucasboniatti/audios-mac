<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>ÁudioFlow - Favoritos</title>
  <link rel="stylesheet" href="/dist/styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="/theme.js"></script>
  <script src="/auth.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 33.333%;
      color: var(--color-text-tertiary);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .nav-item:hover {
      color: var(--color-text-secondary);
    }
    .nav-item.active {
      color: var(--color-primary);
    }
    .nav-icon {
      font-size: 32px;
    }
    .nav-label {
      font-size: 11px;
      font-weight: 500;
    }
    .loading-spinner {
      color: var(--color-text-disabled);
      font-size: 32px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header-audioflow" style="flex-wrap: wrap; gap: 12px;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <a href="/" style="display: flex; align-items: center; gap: 8px; text-decoration: none;">
        <div style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--color-primary);">
          <span class="material-symbols-outlined" style="font-size: 32px; font-weight: bold;">graphic_eq</span>
        </div>
        <h1 style="font-size: 20px; font-weight: 700; color: var(--color-text-primary);">ÁudioFlow</h1>
      </a>
    </div>
    <div style="display: flex; align-items: center; gap: 16px;">
      <span style="font-size: 14px; font-weight: 600; color: var(--color-warning); display: flex; align-items: center; gap: 4px;">
        <span class="material-symbols-outlined" style="font-size: 16px; font-variation-settings: 'FILL' 1;">star</span>
        Favoritos
      </span>
      <div style="text-align: right; display: none;" class="sm:block">
        <p class="text-label" id="username-display">Usuário</p>
        <button onclick="handleLogout()" style="font-size: 12px; color: var(--color-text-tertiary); background: none; border: none; cursor: pointer;">Sair</button>
      </div>
      <button onclick="toggleDarkMode()" style="padding: 8px; color: var(--color-text-tertiary); background: none; border: none; cursor: pointer;">
        <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
      </button>
      <div class="user-avatar">
        <span id="user-initial">U</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main style="flex: 1; padding: 16px; padding-bottom: 96px;">

    <!-- Favorites List -->
    <div id="favorites-list">
      <div style="display: flex; align-items: center; justify-content: center; padding: 48px;">
        <span class="material-symbols-outlined loading-spinner">progress_activity</span>
      </div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state hidden">
      <span class="material-symbols-outlined empty-state-icon">star</span>
      <p class="empty-state-title">Nenhum favorito salvo</p>
      <p class="empty-state-description">Clique na estrela em qualquer transcrição</p>
      <a href="/" style="color: var(--color-primary); font-size: 14px; font-weight: 600; display: inline-block; margin-top: 16px;">Voltar para Gravações</a>
    </div>
  </main>

  <!-- Toast container -->
  <div id="toast-container" style="position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%); z-index: 60;"></div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a class="nav-item" href="/">
      <span class="material-symbols-outlined nav-icon" style="font-variation-settings: 'FILL' 1;">view_list</span>
      <span class="nav-label">Gravações</span>
    </a>
    <div style="position: relative; top: -24px; width: 33.333%; display: flex; justify-content: center;">
      <button class="fab">
        <span class="material-symbols-outlined" style="font-size: 32px;">mic</span>
      </button>
    </div>
    <a class="nav-item" href="/dashboard">
      <span class="material-symbols-outlined nav-icon">dashboard</span>
      <span class="nav-label">Dashboard</span>
    </a>
  </nav>

  <script>
    const API = '';

    // Update theme icon on load
    function updateThemeIcon() {
      const icon = document.getElementById('theme-icon');
      icon.textContent = isDarkMode() ? 'light_mode' : 'dark_mode';
    }
    updateThemeIcon();

    const origToggle = window.toggleDarkMode;
    window.toggleDarkMode = function() {
      origToggle();
      updateThemeIcon();
    };
    window.addEventListener('audioflow:theme-changed', updateThemeIcon);

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function pickTagColor(seed) {
      const palette = ['#007AFF', '#10B981', '#F97316', '#EC4899', '#8B5CF6', '#14B8A6'];
      const hash = Array.from(seed).reduce((acc, char) => acc + char.charCodeAt(0), 0);
      return palette[hash % palette.length];
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
      return `${d.getDate()} de ${months[d.getMonth()]}, ${d.getFullYear()}`;
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function showToast(msg) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.cssText = 'background-color: var(--color-elevated); color: var(--color-text-primary); padding: 8px 16px; border-radius: 9999px; font-size: 14px; box-shadow: var(--shadow-lg);';
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast('Texto copiado!');
      } catch {
        showToast('Erro ao copiar');
      }
    }

    async function toggleFavorite(id) {
      try {
        await AuthAPI.removeFavorite(id);
        await loadFavorites();
        showToast('Removido dos favoritos');
      } catch (err) {
        showToast(err.message || 'Erro ao atualizar favorito');
      }
    }

    function renderTags(tags, transcriptionId) {
      const tagButtons = (tags || []).map((tag) => `
        <button
          onclick="removeTag(${transcriptionId}, ${tag.id})"
          style="display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 9999px; border: 1px solid ${tag.color}; background: ${tag.color}20; color: ${tag.color}; cursor: pointer; font-size: 12px; font-weight: 600;"
          title="Remover tag"
        >
          <span>${escapeHtml(tag.name)}</span>
          <span class="material-symbols-outlined" style="font-size: 14px;">close</span>
        </button>
      `).join('');

      return `
        <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;">
          ${tagButtons}
          <button
            onclick="promptForTag(${transcriptionId})"
            style="display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 9999px; border: 1px dashed var(--color-border-default); background: transparent; color: var(--color-text-tertiary); cursor: pointer; font-size: 12px; font-weight: 600;"
            title="Adicionar tag"
          >
            <span class="material-symbols-outlined" style="font-size: 14px;">add</span>
            <span>Tag</span>
          </button>
        </div>
      `;
    }

    async function promptForTag(transcriptionId) {
      const tagName = prompt('Nome da tag');
      if (!tagName) {
        return;
      }

      const normalizedName = tagName.trim();
      if (!normalizedName) {
        return;
      }

      try {
        const tags = await AuthAPI.getTags();
        let tag = tags.find((candidate) => candidate.name.toLowerCase() === normalizedName.toLowerCase());

        if (!tag) {
          tag = await AuthAPI.createTag({
            name: normalizedName,
            color: pickTagColor(normalizedName),
          });
        }

        await AuthAPI.addTagToTranscription(transcriptionId, tag.id);
        await loadFavorites();
        showToast(`Tag ${tag.name} aplicada`);
      } catch (err) {
        showToast(err.message || 'Erro ao salvar tag');
      }
    }

    async function removeTag(transcriptionId, tagId) {
      try {
        await AuthAPI.removeTagFromTranscription(transcriptionId, tagId);
        await loadFavorites();
        showToast('Tag removida');
      } catch (err) {
        showToast(err.message || 'Erro ao remover tag');
      }
    }

    function groupByDate(items) {
      const groups = {};
      for (const t of items) {
        const key = formatDate(t.timestamp);
        if (!groups[key]) groups[key] = [];
        groups[key].push(t);
      }
      return groups;
    }

    function render(items) {
      const list = document.getElementById('favorites-list');
      const empty = document.getElementById('empty-state');

      if (!items.length) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      const groups = groupByDate(items);
      let html = '';

      for (const [date, itemList] of Object.entries(groups)) {
        html += `
          <section class="date-group">
            <div class="date-group-header">
              <h3 class="date-group-title">${date}</h3>
              <div class="date-group-badge">${itemList.length} item${itemList.length > 1 ? 's' : ''}</div>
            </div>
            <div class="transcription-card">
        `;

        for (const t of itemList) {
          const escaped = escapeHtml(t.text ?? '');
          html += `
            <article class="transcription-item">
              <span style="font-size: 12px; font-weight: 500; color: var(--color-text-tertiary); width: 64px; flex-shrink: 0;">${formatTime(t.timestamp)}</span>
              <div style="flex-grow: 1; padding-right: 84px;">
                <p style="font-size: 15px; line-height: 1.6; color: var(--color-text-primary);">${escaped}</p>
                ${renderTags(t.tags, t.id)}
              </div>
              <div style="position: absolute; top: 12px; right: 12px; display: flex; gap: 8px; opacity: 0; transition: opacity 0.2s ease;" class="item-actions">
                <button onclick="copyText(\`${escaped.replace(/`/g, '\\`')}\`)" style="padding: 4px; background: none; border: none; cursor: pointer; color: var(--color-text-tertiary);" title="Copiar">
                  <span class="material-symbols-outlined" style="font-size: 18px;">content_copy</span>
                </button>
                <button onclick="toggleFavorite(${t.id})" style="padding: 4px; background: none; border: none; cursor: pointer; color: var(--color-warning);" title="Remover favorito">
                  <span class="material-symbols-outlined" style="font-size: 18px; font-variation-settings: 'FILL' 1;">star</span>
                </button>
              </div>
            </article>
          `;
        }

        html += '</div></section>';
      }

      list.innerHTML = html;

      // Add hover effect for actions
      document.querySelectorAll('.transcription-item').forEach(item => {
        const actions = item.querySelector('.item-actions');
        item.addEventListener('mouseenter', () => actions.style.opacity = '1');
        item.addEventListener('mouseleave', () => actions.style.opacity = '0');
      });
    }

    async function loadFavorites() {
      try {
        const favorites = await AuthAPI.getFavorites();
        render(favorites);
      } catch (err) {
        document.getElementById('favorites-list').innerHTML = `
          <div style="text-align: center; padding: 48px;">
            <span class="material-symbols-outlined" style="font-size: 40px; color: var(--color-destructive);">error</span>
            <p style="color: var(--color-text-tertiary);">Erro ao carregar favoritos</p>
          </div>
        `;
      }
    }

    // --- Authentication ---
    async function initAuth() {
      const session = await AuthAPI.requireAuth();
      if (!session) {
        return false;
      }

      document.getElementById('username-display').textContent = session.username;
      document.getElementById('user-initial').textContent = session.username.charAt(0).toUpperCase();
      return true;
    }

    async function handleLogout() {
      await AuthAPI.logout();
      window.location.href = '/login.html';
    }

    async function connectWS() {
      try {
        const wsUrl = await AuthAPI.getWebSocketUrl();
        const ws = new WebSocket(wsUrl);
        ws.onmessage = async (event) => {
          const data = JSON.parse(event.data);
          if (data.type === 'new_transcriptions' || data.type === 'refresh' || data.type === 'transcription_deleted' || data.type === 'favorite_added' || data.type === 'favorite_removed' || data.type === 'tag_added' || data.type === 'tag_removed' || data.type === 'tag_created' || data.type === 'tag_deleted') {
            await loadFavorites();
          } else if (data.type === 'preferences_updated') {
            window.AudioFlowTheme.ensurePreferencesLoaded(true).catch(() => {});
          }
        };
        ws.onclose = () => setTimeout(connectWS, 3000);
      } catch (_) {
        setTimeout(connectWS, 3000);
      }
    }

    async function bootstrap() {
      const authenticated = await initAuth();
      if (!authenticated) return;
      await window.AudioFlowTheme.ensurePreferencesLoaded(true);
      updateThemeIcon();
      await loadFavorites();
      connectWS();
    }

    bootstrap();
  </script>

</body>
</html>
