# AudioFlow — Implementation Plan v1.0
# Generated by: @architect (Aria)
# Date: 2026-03-05

project:
  name: AudioFlow
  version: 1.0.0
  target: macOS 12.0+
  language: Swift 5.9+
  framework: AppKit

# QA Action Items Addressed
qa_feedback_addressed:
  - item: "Hotkey clarification"
    decision: "Space (sozinho) como toggle principal. Fn+Espaço como alternativa opcional."
    rationale: "Fn key é hardware-level e pode não ser detectada. Space toggle é mais confiável."
  - item: "Error Handling"
    decision: "Incluído em cada story com cenários de erro específicos."
  - item: "Timeout máximo"
    decision: "5 minutos de gravação máxima (configurável)."
  - item: "Test Strategy"
    decision: "Incluído Test Strategy section com mocks para SFSpeechRecognizer."

# Architecture Decisions
architecture:
  pattern: MVC
  entry_point: AppDelegate
  state_management: AppState (ObservableObject-like pattern)
  persistence: CoreData with NSPersistentContainer
  
  layers:
    - name: App
      responsibility: "Entry point, lifecycle, menu bar setup"
      files:
        - AppDelegate.swift
        - Info.plist
    - name: Controllers
      responsibility: "Business logic, coordination"
      files:
        - AudioController.swift
        - HotkeyController.swift
        - HistoryController.swift
    - name: Models
      responsibility: "Data structures, state"
      files:
        - Transcription.swift
        - AppState.swift
    - name: Views
      responsibility: "UI components"
      files:
        - MenuBuilder.swift
    - name: Services
      responsibility: "External integrations"
      files:
        - SpeechService.swift
        - ClipboardService.swift
        - PersistenceService.swift

# Implementation Phases
phases:
  - phase: 1
    name: "Project Setup & Scaffolding"
    priority: MUST
    stories:
      - story_id: "1.1"
        title: "Criar projeto Xcode com estrutura base"
        description: "Inicializar projeto Swift/AppKit com estrutura de pastas e arquivos base"
        acceptance_criteria:
          - "Projeto compila sem erros"
          - "Estrutura de pastas criada conforme spec"
          - "Info.plist com permissões configuradas"
        files:
          - AudioFlow.xcodeproj
          - AppDelegate.swift
          - Info.plist
        effort: "S"
        
      - story_id: "1.2"
        title: "Configurar CoreData stack"
        description: "Criar modelo CoreData para Transcription e configurar NSPersistentContainer"
        acceptance_criteria:
          - "CoreData model criado com entity Transcription"
          - "PersistenceService funcional"
          - "CRUD básico funciona"
        files:
          - AudioFlow.xcdatamodeld
          - PersistenceService.swift
          - Transcription.swift
        effort: "S"

  - phase: 2
    name: "Menu Bar App Base"
    priority: MUST
    stories:
      - story_id: "2.1"
        title: "Implementar menu bar status item"
        description: "Criar NSStatusItem com ícone e menu dropdown básico"
        acceptance_criteria:
          - "Ícone aparece no menu bar ao iniciar"
          - "Menu dropdown abre ao clicar"
          - "Menu tem opções: Sair, Sobre"
        files:
          - AppDelegate.swift (atualizado)
          - MenuBuilder.swift
        effort: "S"
        
      - story_id: "2.2"
        title: "Implementar estados do app (IDLE, RECORDING, PROCESSING)"
        description: "Criar AppState para gerenciar estados e transições"
        acceptance_criteria:
          - "AppState define 3 estados claramente"
          - "Ícone muda conforme estado"
          - "Menu atualiza conforme estado"
        files:
          - AppState.swift
          - MenuBuilder.swift (atualizado)
        effort: "M"

  - phase: 3
    name: "Core Features - Audio & Speech"
    priority: MUST
    stories:
      - story_id: "3.1"
        title: "Implementar global hotkey (Space toggle)"
        description: "Criar HotkeyController com NSEvent.addGlobalMonitorForEvents para Space toggle"
        acceptance_criteria:
          - "Space inicia gravação quando app em IDLE"
          - "Space para gravação quando app em RECORDING"
          - "Hotkey funciona com app em background"
        error_handling:
          - "App sem permissão de Accessibility: mostrar alerta com instrução"
          - "Conflito com outro app: log warning, não bloquear"
        files:
          - HotkeyController.swift
        effort: "M"
        technical_notes: |
          Usar NSEvent.addGlobalMonitorForEvents(matching: .keyDown).
          Space toggle é mais confiável que Fn+Espaço.
          Fallback: Cmd+Shift+Space se Space causar conflitos.
        
      - story_id: "3.2"
        title: "Implementar captura de áudio"
        description: "Criar AudioController com AVAudioEngine para capturar áudio do microfone"
        acceptance_criteria:
          - "Captura inicia ao receber sinal do hotkey"
          - "Captura para ao receber sinal de stop"
          - "Áudio é descartado após uso (não persiste)"
        error_handling:
          - "Microfone indisponível: erro no menu, não crash"
          - "Permissão negada: mostrar alerta com instrução"
        files:
          - AudioController.swift
        effort: "M"
        
      - story_id: "3.3"
        title: "Implementar transcrição com SFSpeechRecognizer"
        description: "Criar SpeechService wrapper para SFSpeechRecognizer com pt-BR"
        acceptance_criteria:
          - "Transcrição funciona em pt-BR"
          - "Partial results atualizam em tempo real"
          - "Transcrição final é retornada ao completar"
        error_handling:
          - "Speech Recognition indisponível: mostrar mensagem no menu"
          - "Permissão negada: alerta com instrução para System Preferences"
          - "Erro de rede (speech online): continuar tentando, mostrar indicador"
        files:
          - SpeechService.swift
        effort: "M"
        technical_notes: |
          SFSpeechRecognizer precisa de internet para alguns casos.
          shouldReportPartialResults = true para real-time feedback.
          Locale(identifier: "pt_BR")

      - story_id: "3.4"
        title: "Implementar clipboard automático"
        description: "Criar ClipboardService para copiar texto automaticamente"
        acceptance_criteria:
          - "Texto transcrito vai para clipboard automaticamente"
          - "Cmd+V funciona em qualquer app após transcrição"
          - "Clipboard limpo antes de copiar novo texto"
        files:
          - ClipboardService.swift
        effort: "S"

  - phase: 4
    name: "History & Search"
    priority: SHOULD
    stories:
      - story_id: "4.1"
        title: "Implementar histórico de transcrições"
        description: "Salvar transcrições no CoreData e mostrar no menu"
        acceptance_criteria:
          - "Cada transcrição é salva com timestamp"
          - "Últimas 10 transcrições aparecem no menu"
          - "FIFO: item mais antigo removido quando excede 10"
        files:
          - HistoryController.swift
          - PersistenceService.swift (atualizado)
          - MenuBuilder.swift (atualizado)
        effort: "M"
        
      - story_id: "4.2"
        title: "Implementar busca no histórico"
        description: "Permitir busca textual nas transcrições salvas"
        acceptance_criteria:
          - "Campo de busca no menu"
          - "Busca filtra em tempo real"
          - "Resultados mostram texto completo"
        files:
          - HistoryController.swift (atualizado)
          - MenuBuilder.swift (atualizado)
        effort: "S"

  - phase: 5
    name: "Export & Polish"
    priority: COULD
    stories:
      - story_id: "5.1"
        title: "Implementar export TXT"
        description: "Exportar histórico de transcrições em arquivo TXT"
        acceptance_criteria:
          - "Opção 'Exportar TXT' no menu"
          - "Save panel abre para escolher local"
          - "Arquivo TXT gerado com timestamps"
        files:
          - HistoryController.swift (atualizado)
        effort: "S"
        
      - story_id: "5.2"
        title: "Adicionar notificações e feedback visual"
        description: "Notificar usuário sobre ações importantes"
        acceptance_criteria:
          - "Notificação 'Texto copiado' após transcrição"
          - "Ícone muda durante gravação (vermelho/pulsante)"
          - "Som opcional ao iniciar/parar gravação"
        files:
          - AppDelegate.swift (atualizado)
          - MenuBuilder.swift (atualizado)
        effort: "S"

  - phase: 6
    name: "Testing & Documentation"
    priority: MUST
    stories:
      - story_id: "6.1"
        title: "Escrever testes unitários"
        description: "Criar testes para serviços principais"
        acceptance_criteria:
          - "SpeechService tem testes com mock"
          - "ClipboardService tem testes"
          - "PersistenceService tem testes"
          - "Cobertura > 70%"
        files:
          - SpeechServiceTests.swift
          - ClipboardServiceTests.swift
          - PersistenceServiceTests.swift
        effort: "M"
        
      - story_id: "6.2"
        title: "Testes de integração e performance"
        description: "Validar fluxo completo e métricas NFR"
        acceptance_criteria:
          - "Latência < 500ms validada"
          - "Memória < 100MB em idle validada"
          - "Fluxo hotkey → transcrição → clipboard funciona"
        files:
          - AudioFlowIntegrationTests.swift
          - PerformanceTests.swift
        effort: "M"

  - phase: 7
    name: "Web Companion Dashboard"
    priority: SHOULD
    stories:
      - story_id: "7.1"
        title: "Disponibilizar companion web local autenticado"
        description: "Expor frontend web local com autenticação por sessão, rotas protegidas e atualização em tempo real"
        acceptance_criteria:
          - "Usuário acessa frontend local via navegador após login com senha local"
          - "Rotas protegidas bloqueiam acesso sem token válido"
          - "WebSocket notifica novas transcrições em tempo real"
        files:
          - frontend/server.js
          - frontend/login.html
          - frontend/auth.js
        effort: "M"

      - story_id: "7.2"
        title: "Implementar histórico e dashboard web"
        description: "Renderizar histórico, busca, estatísticas e exportações estruturadas no frontend web com leitura read-only do CoreData"
        acceptance_criteria:
          - "Página Gravações lista transcrições e busca em tempo real"
          - "Dashboard mostra métricas e filtros derivados do histórico"
          - "Exportações CSV e JSON geram arquivos válidos"
        files:
          - frontend/index.html
          - frontend/dashboard.html
          - frontend/server.js
        effort: "M"

      - story_id: "7.3"
        title: "Implementar organização pessoal no frontend web"
        description: "Persistir favoritos, tags e preferências do usuário em banco local separado sem modificar o CoreData"
        acceptance_criteria:
          - "Usuário marca e remove favoritos no frontend"
          - "Usuário cria tags e associa tags a transcrições"
          - "Preferências de tema e interface persistem entre sessões"
        files:
          - frontend/favorites.html
          - frontend/theme.js
          - frontend/server.js
          - frontend/styles.css
        effort: "M"

  - phase: 8
    name: "Design System & Shared UI Foundations"
    priority: COULD
    stories:
      - story_id: "8.1"
        title: "Formalizar design tokens compartilhados"
        description: "Consolidar tokens.yaml como source of truth e garantir exports gerados para CSS, JSON, Tailwind e Swift"
        acceptance_criteria:
          - "Build de tokens gera artefatos válidos a partir de design-tokens/tokens.yaml"
          - "Frontend consome tokens sem reintroduzir estilos hardcoded críticos"
          - "Tokens Swift permanecem disponíveis para adoção incremental no app macOS"
        files:
          - design-tokens/tokens.yaml
          - scripts/build-tokens.js
          - frontend/styles.css
        effort: "M"

      - story_id: "8.2"
        title: "Documentar catálogo visual e guidelines do design system"
        description: "Publicar documentação local de uso dos tokens e componentes com Storybook e guias de contribuição"
        acceptance_criteria:
          - "Storybook local documenta tokens e componentes principais"
          - "README do design system descreve fluxo de build, uso e governança"
          - "Demo local do frontend referencia o design system compartilhado"
        files:
          - README_DESIGN_SYSTEM.md
          - .storybook/main.js
          - frontend/design-system-demo.html
          - CONTRIBUTING.md
        effort: "M"

      - story_id: "8.3"
        title: "Disponibilizar componentes compartilhados para web e Swift"
        description: "Manter componentes reutilizáveis e assets de marca prontos para adoção incremental sem reescrever as superfícies existentes"
        acceptance_criteria:
          - "Componentes React ficam disponíveis para uso no frontend local"
          - "Componentes Swift e tokens ficam disponíveis para novas superfícies do app"
          - "Assets de marca e tokens permanecem consistentes entre web e macOS"
        files:
          - frontend/components/index.tsx
          - AudioFlow/Sources/Components/AudioFlowComponents.swift
          - AudioFlow/Sources/DesignTokens/AudioFlowColors.swift
          - AudioFlow/Assets/logo.svg
        effort: "M"

# Test Strategy
test_strategy:
  unit_tests:
    - service: SpeechService
      mock_approach: "Criar protocol SpeechRecognizing, mock retorna texto fixo"
      test_cases:
        - "Transcrição retorna texto correto"
        - "Partial results são emitidos"
        - "Erro de permissão é tratado"
        
    - service: ClipboardService
      test_cases:
        - "Texto é copiado para pasteboard"
        - "Pasteboard é limpo antes de copiar"
        
    - service: PersistenceService
      test_cases:
        - "Transcrição é salva corretamente"
        - "FIFO remove item mais antigo"
        - "Busca retorna resultados corretos"
        
  integration_tests:
    - name: "Hotkey → Recording → Transcription → Clipboard"
      steps:
        - "Pressionar Space"
        - "Verificar estado RECORDING"
        - "Pressionar Space novamente"
        - "Verificar clipboard contém texto transcrito"
        
  performance_tests:
    - name: "Latência de início"
      metric: "< 500ms"
      approach: "Medir tempo entre hotkey e estado RECORDING"
      
    - name: "Memória em idle"
      metric: "< 100MB"
      approach: "Instruments memory profiling"

# Risk Mitigation
risk_mitigation:
  - risk: "Fn key não detectável"
    mitigation: "Space toggle como primary approach"
    fallback: "Cmd+Shift+Space como alternativa"
    
  - risk: "Carbon API deprecated"
    mitigation: "Não usar Carbon. Usar NSEvent.addGlobalMonitorForEvents"
    
  - risk: "Speech Recognition requer internet"
    mitigation: "Mostrar indicador de processamento"
    fallback: "Cache local de texto parcial se offline"

