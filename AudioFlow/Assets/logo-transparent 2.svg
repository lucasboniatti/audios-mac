<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- AudioFlow Logo - Sound Waves - Transparent Background -->

  <!-- Sound Wave Bars - Centered -->
  <g transform="translate(256, 256)">
    <!-- Center bar (tallest) -->
    <rect x="-12" y="-80" width="24" height="160" fill="black" rx="12"/>

    <!-- Inner bars -->
    <rect x="-52" y="-50" width="20" height="100" fill="black" rx="10"/>
    <rect x="32" y="-50" width="20" height="100" fill="black" rx="10"/>

    <!-- Middle bars -->
    <rect x="-92" y="-30" width="18" height="60" fill="black" rx="9"/>
    <rect x="74" y="-30" width="18" height="60" fill="black" rx="9"/>

    <!-- Outer bars (shortest) -->
    <rect x="-128" y="-18" width="16" height="36" fill="black" rx="8"/>
    <rect x="112" y="-18" width="16" height="36" fill="black" rx="8"/>
  </g>
</svg>